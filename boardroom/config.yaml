default_constraints: thorough
default_mode: freeform
budget_hard_stop: true
time_hard_stop: false

constraints:
  quick:
    budget: 5
    time_limit_minutes: 15
    max_debate_rounds: 2
    max_roster_size: 4
  standard:
    budget: 10
    time_limit_minutes: 30
    max_debate_rounds: 4
  thorough:
    budget: 25
    time_limit_minutes: 60
    max_debate_rounds: 8
  deep-dive:
    budget: 500
    time_limit_minutes: 240
    max_debate_rounds: 20
